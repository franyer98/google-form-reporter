name: Reporte diario del formulario

on:
  schedule:
    - cron: "0 13 * * *"   # 8:00 am hora Colombia (UTC-5) — ajusta si lo necesitas
  workflow_dispatch:         # permite ejecutarlo manualmente desde GitHub

jobs:
  generar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear archivo de credenciales
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON_B64 }}" | base64 -d > credentials.json 

      - name: Generar reporte
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          OUTPUT_DIR: reportes
        run: python report_generator.py

      - name: Subir reportes como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: reportes
          path: |
            reportes/*.xlsx
            reportes/*.pdf
